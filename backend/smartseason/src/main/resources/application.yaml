server:
  port: 8080

spring:
  application:
    name: smartseason-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/smartseason
    username: postgres
    password: sudo
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      fail-on-empty-beans: false

jwt:
  secret: change-this-to-a-long-secure-random-string
  expiration: 86400000

logging:
  level:
    org.springframework: INFO
    com.smartseason: DEBUG